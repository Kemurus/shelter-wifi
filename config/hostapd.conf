# Shelter WiFi hotspot — runs on uap0 (virtual AP on built-in wlan0 hardware)
# wlan0 stays connected to management WiFi (configured via NetworkManager)
# uap0 is the virtual AP interface created by setup_interfaces.sh

interface=uap0
driver=nl80211
ctrl_interface=/var/run/hostapd
ctrl_interface_group=netdev
ssid=Fierber_6_shelter
hw_mode=g
channel=0
ieee80211n=1
wmm_enabled=1
macaddr_acl=0
auth_algs=1
ignore_broadcast_ssid=0

# Client isolation: clients cannot see each other
ap_isolate=1

# Country code
country_code=IL
